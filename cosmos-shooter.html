<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COSMOS · CODE7 ARCADE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 6px 14px;
    background: rgba(10,10,40,0.95);
    border: 1px solid #1a1a6e;
    border-bottom: none;
    color: #a8d8f0;
    font-size: 13px;
    letter-spacing: 2px;
  }
  #hud .score-val { color: #ffd166; }
  #hud .lives-val { color: #ff6b9d; letter-spacing: 3px; }
  canvas {
    display: block;
    max-width: 100vw;
    border: 1px solid #1a1a6e;
  }
  #footer {
    color: #1a2a4a;
    font-size: 10px;
    margin-top: 8px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="hud">
  <span>SCORE <span class="score-val" id="scoreEl">0</span></span>
  <span class="lives-val" id="livesEl">♥ ♥ ♥</span>
  <span>BEST <span class="score-val" id="bestEl">0</span></span>
</div>
<canvas id="c" width="480" height="640"></canvas>
<div id="footer">COSMOS v1.0 · CODE7 ARCADE</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;

// Scale canvas for mobile
function resize() {
  const maxW = Math.min(window.innerWidth, 480);
  const scale = maxW / W;
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  document.getElementById('hud').style.width = (W * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// Stars
const STARS = Array.from({length: 80}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  size: Math.random() * 2 + 0.5,
  opacity: Math.random() * 0.7 + 0.2,
  speed: Math.random() * 0.4 + 0.2,
}));

// Game state
let state = 'idle'; // idle | playing | dead
let score = 0, highScore = 0, lives = 3;
let player, bullets, enemyBullets, enemies, explosions, particles;
let lastFire = 0, lastEnemySpawn = 0, lastEnemyFire = 0;
let keys = {};
let lastTime = 0;
let isTouching = false;

function initGame() {
  player = { x: W/2, y: H - 70, w: 36, h: 44 };
  bullets = []; enemyBullets = []; enemies = []; explosions = []; particles = [];
  score = 0; lives = 3;
  lastFire = 0; lastEnemySpawn = 0; lastEnemyFire = 0;
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('livesEl').textContent = '♥ '.repeat(Math.max(0, lives)).trim() || '✕';
  document.getElementById('bestEl').textContent = highScore;
}

// Drawing
function drawPlayer(x, y) {
  ctx.save();
  // Engine glow
  const eg = ctx.createRadialGradient(x, y+20, 0, x, y+20, 10);
  eg.addColorStop(0, 'rgba(255,209,102,0.9)');
  eg.addColorStop(0.5, 'rgba(255,107,53,0.6)');
  eg.addColorStop(1, 'transparent');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.ellipse(x, y+20, 8, 4, 0, 0, Math.PI*2); ctx.fill();

  // Body right
  ctx.fillStyle = '#a8d8f0';
  ctx.beginPath();
  ctx.moveTo(x, y-22); ctx.lineTo(x+12, y+16); ctx.lineTo(x, y+10); ctx.closePath();
  ctx.fill();
  // Body left
  ctx.fillStyle = '#7ec8e3';
  ctx.beginPath();
  ctx.moveTo(x, y-22); ctx.lineTo(x-12, y+16); ctx.lineTo(x, y+10); ctx.closePath();
  ctx.fill();
  // Wings
  ctx.fillStyle = '#5ba3c9';
  ctx.beginPath(); ctx.moveTo(x-12,y+16); ctx.lineTo(x-18,y+22); ctx.lineTo(x-6,y+14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+12,y+16); ctx.lineTo(x+18,y+22); ctx.lineTo(x+6,y+14); ctx.closePath(); ctx.fill();
  // Cockpit
  ctx.fillStyle = '#1a1a4e';
  ctx.beginPath(); ctx.ellipse(x, y-6, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(79,195,247,0.6)';
  ctx.beginPath(); ctx.ellipse(x, y-7, 3, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

const ENEMY_COLORS = [
  ['#ff6b9d','#c0392b'],
  ['#a29bfe','#6c5ce7'],
  ['#55efc4','#00b894'],
];

function drawEnemy(x, y, type) {
  const [light, dark] = ENEMY_COLORS[type % 3];
  ctx.save();
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(x, y+14); ctx.lineTo(x-14, y-10); ctx.lineTo(x+14, y-10); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = light;
  ctx.beginPath();
  ctx.moveTo(x, y+10); ctx.lineTo(x-10, y-6); ctx.lineTo(x+10, y-6); ctx.closePath();
  ctx.fill();
  // Antennae
  ctx.strokeStyle = light; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x-14,y-10); ctx.lineTo(x-18,y-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+14,y-10); ctx.lineTo(x+18,y-14); ctx.stroke();
  // Eye
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(x, y-2, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = dark;
  ctx.beginPath(); ctx.arc(x, y-2, 3, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBullet(x, y, isEnemy) {
  ctx.save();
  const grad = ctx.createLinearGradient(x, y-7, x, y+7);
  if (isEnemy) {
    grad.addColorStop(0, '#ff6b9d');
    grad.addColorStop(1, '#c0392b');
    ctx.shadowColor = '#ff6b9d';
  } else {
    grad.addColorStop(0, '#ffd166');
    grad.addColorStop(1, '#ff6b35');
    ctx.shadowColor = '#ffd166';
  }
  ctx.shadowBlur = 8;
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(x-2, y-7, 4, 14, 2);
  ctx.fill();
  ctx.restore();
}

function drawExplosion(ex) {
  const size = 10 + ex.frame * 8;
  const opacity = 1 - ex.frame / 8;
  const grad = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, size);
  grad.addColorStop(0, `rgba(255,209,102,${opacity})`);
  grad.addColorStop(0.5, `rgba(255,107,53,${opacity * 0.7})`);
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(ex.x, ex.y, size, 0, Math.PI*2); ctx.fill();
}

function drawStars() {
  STARS.forEach(s => {
    ctx.globalAlpha = s.opacity;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, (s.y) % H, s.size, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawIdleScreen() {
  // Title glow
  ctx.save();
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 30;
  ctx.fillStyle = '#a8d8f0';
  ctx.font = 'bold 38px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('COSMOS', W/2, H/2 - 100);
  ctx.restore();

  ctx.fillStyle = '#6c8ebf';
  ctx.font = '13px Courier New';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '4px';
  ctx.fillText('SPACE SHOOTER', W/2, H/2 - 68);

  drawPlayer(W/2, H/2 - 10);

  // START button
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 12;
  ctx.strokeRect(W/2 - 60, H/2 + 50, 120, 40);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(79,195,247,0.08)';
  ctx.fillRect(W/2 - 60, H/2 + 50, 120, 40);
  ctx.fillStyle = '#a8d8f0';
  ctx.font = '16px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('START', W/2, H/2 + 76);

  ctx.fillStyle = '#3a5a7a';
  ctx.font = '10px Courier New';
  ctx.fillText('ARROW/WASD : MOVE   SPACE/Z : FIRE', W/2, H/2 + 120);
  ctx.fillText('MOBILE : TOUCH & DRAG', W/2, H/2 + 138);
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(2,2,16,0.75)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = '#ff6b9d';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 30px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 80);
  ctx.restore();

  ctx.fillStyle = '#a8d8f0';
  ctx.font = '14px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE', W/2, H/2 - 40);
  ctx.fillStyle = '#ffd166';
  ctx.font = 'bold 32px Courier New';
  ctx.fillText(score, W/2, H/2 - 10);

  if (score > 0 && score >= highScore) {
    ctx.fillStyle = '#ffd166';
    ctx.font = '12px Courier New';
    ctx.fillText('✦ NEW RECORD ✦', W/2, H/2 + 18);
  }

  ctx.fillStyle = '#6c8ebf';
  ctx.font = '12px Courier New';
  ctx.fillText('BEST: ' + highScore, W/2, H/2 + 40);

  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff6b9d';
  ctx.shadowBlur = 10;
  ctx.strokeRect(W/2 - 55, H/2 + 58, 110, 38);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,107,157,0.08)';
  ctx.fillRect(W/2 - 55, H/2 + 58, 110, 38);
  ctx.fillStyle = '#ff6b9d';
  ctx.font = '15px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('RETRY', W/2, H/2 + 83);
}

function gameLoop(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime = now;

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#020210');
  bg.addColorStop(0.5, '#0a0a2e');
  bg.addColorStop(1, '#0d0d3b');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Scroll stars
  STARS.forEach(s => { s.y += s.speed; if (s.y > H) s.y = -2; });
  drawStars();

  // Nebula accents
  const neb1 = ctx.createRadialGradient(60, 100, 0, 60, 100, 80);
  neb1.addColorStop(0, 'rgba(108,92,231,0.06)');
  neb1.addColorStop(1, 'transparent');
  ctx.fillStyle = neb1; ctx.beginPath(); ctx.arc(60, 100, 80, 0, Math.PI*2); ctx.fill();

  if (state === 'idle') {
    drawIdleScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (state === 'dead') {
    // still draw enemies fading
    enemies.forEach(e => drawEnemy(e.x, e.y, e.type));
    drawGameOverScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  // --- PLAYING ---

  // Move player (keyboard)
  if (keys['ArrowLeft'] || keys['KeyA']) player.x = Math.max(18, player.x - 5);
  if (keys['ArrowRight'] || keys['KeyD']) player.x = Math.min(W - 18, player.x + 5);
  if (keys['ArrowUp'] || keys['KeyW']) player.y = Math.max(22, player.y - 5);
  if (keys['ArrowDown'] || keys['KeyS']) player.y = Math.min(H - 30, player.y + 5);

  // Fire
  if ((keys['Space'] || keys['KeyZ']) && now - lastFire > 200) {
    bullets.push({ x: player.x, y: player.y - 22 });
    lastFire = now;
  }

  // Move bullets
  bullets = bullets.map(b => ({...b, y: b.y - 8})).filter(b => b.y > -10);

  // Spawn enemies
  const spawnInterval = Math.max(600, 1400 - score * 2);
  if (now - lastEnemySpawn > spawnInterval) {
    enemies.push({
      x: 24 + Math.random() * (W - 48),
      y: -20,
      type: Math.floor(Math.random() * 3),
    });
    lastEnemySpawn = now;
  }

  // Move enemies
  const spd = 1.2 + score * 0.005;
  enemies = enemies.map(e => ({...e, y: e.y + spd})).filter(e => e.y < H + 30);

  // Enemy fire
  if (now - lastEnemyFire > 1800 && enemies.length > 0) {
    const shooter = enemies[Math.floor(Math.random() * enemies.length)];
    enemyBullets.push({ x: shooter.x, y: shooter.y + 16 });
    lastEnemyFire = now;
  }
  enemyBullets = enemyBullets.map(b => ({...b, y: b.y + 5})).filter(b => b.y < H + 10);

  // Bullet-enemy collisions
  let newExplosions = [];
  bullets = bullets.filter(b => {
    let hit = false;
    enemies = enemies.filter(e => {
      if (!hit && Math.abs(b.x - e.x) < 20 && Math.abs(b.y - e.y) < 20) {
        hit = true;
        newExplosions.push({ x: e.x, y: e.y, frame: 0 });
        score += 10;
        return false;
      }
      return true;
    });
    return !hit;
  });

  // Enemy bullet hits player
  const hitByBullet = enemyBullets.some(b =>
    Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 22
  );
  if (hitByBullet) {
    enemyBullets = [];
    newExplosions.push({ x: player.x, y: player.y, frame: 0 });
    lives--;
    if (lives <= 0) { endGame(); return; }
  }

  // Enemy collides with player
  enemies = enemies.filter(e => {
    if (Math.abs(e.x - player.x) < 28 && Math.abs(e.y - player.y) < 28) {
      newExplosions.push({ x: e.x, y: e.y, frame: 0 });
      lives--;
      if (lives <= 0) { endGame(); return false; }
      return false;
    }
    return true;
  });

  // Update explosions
  explosions = [
    ...explosions.map(ex => ({...ex, frame: ex.frame + 1})).filter(ex => ex.frame < 8),
    ...newExplosions,
  ];

  // Draw everything
  explosions.forEach(drawExplosion);
  enemies.forEach(e => drawEnemy(e.x, e.y, e.type));
  bullets.forEach(b => drawBullet(b.x, b.y, false));
  enemyBullets.forEach(b => drawBullet(b.x, b.y, true));
  drawPlayer(player.x, player.y);

  updateHUD();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  highScore = Math.max(highScore, score);
  state = 'dead';
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  initGame();
  state = 'playing';
  lastTime = performance.now();
}

// Click on canvas
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;

  if (state === 'idle') {
    if (cx > W/2-60 && cx < W/2+60 && cy > H/2+50 && cy < H/2+90) startGame();
  } else if (state === 'dead') {
    if (cx > W/2-55 && cx < W/2+55 && cy > H/2+58 && cy < H/2+96) startGame();
  }
});

// Touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const tx = (e.touches[0].clientX - rect.left) * scaleX;
  const ty = (e.touches[0].clientY - rect.top) * scaleY;

  if (state === 'idle') {
    if (tx > W/2-60 && tx < W/2+60 && ty > H/2+50 && ty < H/2+90) { startGame(); return; }
  } else if (state === 'dead') {
    if (tx > W/2-55 && tx < W/2+55 && ty > H/2+58 && ty < H/2+96) { startGame(); return; }
  }

  isTouching = true;
  keys['Space'] = true;
  if (state === 'playing') {
    player.x = Math.max(18, Math.min(W-18, tx));
    player.y = Math.max(22, Math.min(H-30, ty));
  }
}, {passive: false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isTouching || state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  player.x = Math.max(18, Math.min(W-18, (e.touches[0].clientX - rect.left) * scaleX));
  player.y = Math.max(22, Math.min(H-30, (e.touches[0].clientY - rect.top) * scaleY));
}, {passive: false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  isTouching = false;
  keys['Space'] = false;
}, {passive: false});

// Keyboard
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'Enter' || e.code === 'Space') {
    if (state === 'idle' || state === 'dead') startGame();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Start loop
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
